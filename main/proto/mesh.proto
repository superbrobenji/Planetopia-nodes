syntax = "proto3";
package mesh;

message MeshMessage {
  uint32 messageType       = 1;
  sint32 dataType          = 2;
  bytes  originMacAddress  = 3;
  bytes  targetMacAddress  = 4;
  bytes  lastHopMacAddress = 5;
  optional bytes  data              = 6;
  uint32 hopCount          = 7;
  uint32 epochNum          = 8;
  uint32 seqNum            = 9;
  uint32 protoVersion      = 10;
  optional bytes  public_key        = 11;
}
